<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e27"/>
      <stop offset="100%" style="stop-color:#1a1040"/>
    </linearGradient>
    <linearGradient id="moon" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d4a574"/>
      <stop offset="100%" style="stop-color:#c4955a"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#b8a9c9"/>
      <stop offset="100%" style="stop-color:#8b7aaa"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="256" cy="256" r="256" fill="url(#bg)"/>
  <!-- Stars -->
  <circle cx="120" cy="100" r="3" fill="#e8dcc8" opacity="0.8"/>
  <circle cx="380" cy="130" r="2.5" fill="#e8dcc8" opacity="0.6"/>
  <circle cx="90" cy="250" r="2" fill="#e8dcc8" opacity="0.5"/>
  <circle cx="420" cy="220" r="3" fill="#e8dcc8" opacity="0.7"/>
  <circle cx="160" cy="380" r="2" fill="#e8dcc8" opacity="0.4"/>
  <circle cx="350" cy="370" r="2.5" fill="#e8dcc8" opacity="0.5"/>
  <circle cx="200" cy="140" r="1.5" fill="#e8dcc8" opacity="0.6"/>
  <circle cx="310" cy="90" r="2" fill="#e8dcc8" opacity="0.7"/>
  <!-- Crescent moon -->
  <path d="M280 120 C280 120, 340 160, 340 240 C340 320, 280 360, 220 360 C260 340, 290 300, 290 240 C290 180, 260 140, 220 120 C240 110, 260 110, 280 120Z" fill="url(#moon)"/>
  <!-- Book -->
  <path d="M150 280 L256 250 L362 280 L362 400 L256 370 L150 400Z" fill="url(#glow)" opacity="0.3"/>
  <path d="M150 280 L256 250 L256 370 L150 400Z" fill="url(#glow)" opacity="0.5"/>
  <path d="M256 250 L362 280 L362 400 L256 370Z" fill="url(#glow)" opacity="0.4"/>
  <!-- Book spine -->
  <line x1="256" y1="250" x2="256" y2="370" stroke="#d4a574" stroke-width="2" opacity="0.6"/>
  <!-- Sparkle on book -->
  <path d="M256 300 L260 290 L264 300 L274 304 L264 308 L260 318 L256 308 L246 304Z" fill="#d4a574" opacity="0.8"/>
</svg>
